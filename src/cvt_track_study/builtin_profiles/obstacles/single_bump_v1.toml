[profile]
id = "builtin.obstacle.single_bump_v1"
scope = "obstacle"
version = 1
description = "Broad speed-quadratic loss prior for one bump, pipe, tire, hole, drop, or pit with unresolved geometry."
extends = []

[config.obstacle_model]
status = "declared"

[config.obstacle_model.model_type]
nominal = "speed_quadratic_energy"
source = { kind = "inherited_default", reference = "builtin.obstacle.single_bump_v1@1 broad uncalibrated engineering prior" }
uncertainty = { distribution = "fixed", reason = "The profile selects one explicit Phase 5 mechanism; model-form alternatives are declared by choosing another profile." }

[config.obstacle_model.parameters]

[config.obstacle_model.parameters.specific_fixed_energy]
nominal = 0.2
unit = "J/kg"
source = { kind = "inherited_default", reference = "builtin.obstacle.single_bump_v1@1 broad uncalibrated engineering prior" }

[config.obstacle_model.parameters.specific_fixed_energy.uncertainty]
distribution = "triangular"
role = "structural"
lower = 0.0
mode = 0.2
upper = 0.8

[config.obstacle_model.parameters.impact_coefficient]
nominal = 5.0
unit = "kg"
source = { kind = "inherited_default", reference = "builtin.obstacle.single_bump_v1@1 broad uncalibrated engineering prior" }

[config.obstacle_model.parameters.impact_coefficient.uncertainty]
distribution = "triangular"
role = "structural"
lower = 1.0
mode = 5.0
upper = 15.0
