[study]
name = "final_drive_sweep"
type = "design_sweep"
vehicle_id = "mcmaster"
random_seed = 20260715

[base_case]
study = "baseline"

[design_variable]
path = "drivetrain.final_drive_ratio"
values = [5.5, 6.2, 6.9, 7.556, 8.2, 8.9, 9.6]

[sampling]
mode = "measured_track"
replicates = 7
paired_scenarios = true
gate_sampling = "paired_lap"

[decision_thresholds]
maximum_time_penalty_s = 3.0
maximum_opportunity_loss_kj = 120.0

[reporting]
bootstrap_resamples = 1000

[quality]
maximum_abs_energy_balance_relative_error = 0.01
maximum_abs_powertrain_balance_relative_error = 0.01
