[study]
name = "full_uncertainty"
type = "full_uncertainty"
vehicle_id = "mcmaster"
random_seed = 20260715

[base_case]
study = "baseline"

[sampling]
mode = "all_declared"
# Number of common structural + measured-traversal draws replayed on every
# admitted track interpretation. With 14 track cases, 30 creates 420 joint
# scenarios. Increase toward 50 only after checking convergence.
replicates = 30
layout = "cross_track_cases"
paired_scenarios = true
gate_sampling = "paired_lap"

# Consume the latest data-only track-robustness ensemble. If it does not exist,
# build it first. Track cases are unweighted epistemic stress scenarios, not
# probability-calibrated random draws.
[track_ensemble]
enabled = true
result_directory = "latest"
auto_build = true
study = "track_robustness"
maximum_cases = 20
include_categories = [
  "nominal",
  "data_support",
  "telemetry_cleanup",
  "centreline",
  "event_windows",
  "gate_policy",
  "gate_weighting",
]

[reporting]
bootstrap_resamples = 2000
top_driver_count = 15
html_report = true

[quality]
maximum_abs_energy_balance_relative_error = 0.01
maximum_abs_powertrain_balance_relative_error = 0.01
